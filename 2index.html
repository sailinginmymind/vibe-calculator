<body>

    <div class="calculator">
        <input type="text" id="display" disabled>
        <div class="buttons">
            <button onclick="clearDisplay()">C</button>
            <button onclick="deleteLast()">⌫</button>
            <button onclick="percentage()">%</button>
            <button onclick="appendToDisplay('/')" class="operator">/</button>
            
            <button onclick="appendToDisplay('7')">7</button>
            <button onclick="appendToDisplay('8')">8</button>
            <button onclick="appendToDisplay('9')">9</button>
            <button onclick="appendToDisplay('*')" class="operator">×</button>
            
            <button onclick="appendToDisplay('4')">4</button>
            <button onclick="appendToDisplay('5')">5</button>
            <button onclick="appendToDisplay('6')">6</button>
            <button onclick="appendToDisplay('-')" class="operator">-</button>
            
            <button onclick="appendToDisplay('1')">1</button>
            <button onclick="appendToDisplay('2')">2</button>
            <button onclick="appendToDisplay('3')">3</button>
            <button onclick="appendToDisplay('+')" class="operator">+</button>
            
            <button onclick="appendToDisplay('0')">0</button>
            <button onclick="appendToDisplay('.')">.</button>
            <button onclick="calculate()" style="grid-column: span 2; width: 135px; border-radius: 30px; background: #4caf50; color: white;">=</button>
        </div>
    </div>

    <script>
        // JavaScript: Il "Cervello" - Assicurati di avere anche la funzione percentuale qui sotto
        const display = document.getElementById('display');

        function appendToDisplay(input) {
            display.value += input;
        }

        function clearDisplay() {
            display.value = "";
        }

        function deleteLast() {
            display.value = display.value.slice(0, -1);
        }

        // Questa è la funzione che abbiamo aggiunto prima
        function percentage() {
            if (display.value !== "") {
                try {
                    display.value = eval(display.value) / 100;
                } catch (error) {
                    display.value = "Errore";
                }
            }
        }

        function calculate() {
            try {
                // eval() calcola la stringa matematica nel display
                if (display.value !== "") {
                    display.value = eval(display.value);
                }
            } catch (error) {
                display.value = "Errore";
            }
        }
    </script>
</body>
