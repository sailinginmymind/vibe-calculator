<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vibe Calculator Pro</title>
    <style>
        /* RESET E PROTEZIONE */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #e0e0e0;
            font-family: -apple-system, sans-serif;
            touch-action: none; /* Blocca zoom a livello CSS */
            overflow: hidden;
        }

        /* STILE CALCOLATRICE (Neumorphic) */
        .calculator {
            background-color: #e0e0e0;
            padding: 20px;
            border-radius: 30px;
            box-shadow: 20px 20px 60px #bebebe, -20px -20px 60px #ffffff;
            width: 320px;
        }

        #display {
            width: 100%;
            height: 60px;
            background: #e0e0e0;
            border: none;
            border-radius: 10px;
            box-shadow: inset 6px 6px 12px #bebebe, inset -6px -6px 12px #ffffff;
            margin-bottom: 20px;
            text-align: right;
            padding: 10px 15px;
            font-size: 1.5rem;
            color: #444;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            overflow: hidden;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        button {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            background: #e0e0e0;
            box-shadow: 6px 6px 12px #bebebe, -6px -6px 12px #ffffff;
            font-size: 1.2rem;
            font-weight: bold;
            color: #444;
            cursor: pointer;
            touch-action: manipulation; /* Reattività immediata */
            user-select: none;
            -webkit-user-select: none;
            transition: all 0.2s ease;
        }

        button:active {
            box-shadow: inset 4px 4px 8px #bebebe, inset -4px -4px 8px #ffffff;
            transform: scale(0.95);
        }

        .operator { color: #ff9f0a; }
        .clear { color: #ff3b30; }
        .equal {
            grid-column: span 2;
            width: 100%;
            border-radius: 30px;
            background: #34c759;
            color: white;
        }
    </style>
</head>
<body>

        <div id="display">0</div>
        <div class="buttons">

            <button class="operator" onclick="cancella()">⌫</button>
            <button class="operator" onclick="aggiungi('%')">%</button>
            <button class="operator" onclick="aggiungi('/')">÷</button>

            <button onclick="aggiungi('8')">8</button>
            <button onclick="aggiungi('9')">9</button>
            <button class="operator" onclick="aggiungi('*')">×</button>
