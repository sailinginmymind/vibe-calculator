<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vibe Calculator Pro</title>
    <style>
        /* CSS per il layout e protezione tocco */
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #e0e0e0;
            font-family: sans-serif;
            touch-action: none; /* Blocca zoom a livello CSS */
        }
        
        /* Qui va tutto il tuo CSS originale della calcolatrice... */
        /* Assicurati che i tuoi bottoni abbiano questo: */
        button {
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }
    </style>
</head>
<body>

    <script>
        // --- PROTEZIONE ANTI-ZOOM JAVASCRIPT ---
        document.addEventListener('touchstart', function (event) {
            if (event.touches.length > 1) event.preventDefault();
        }, { passive: false });

        let lastTouchEnd = 0;
        document.addEventListener('touchend', function (event) {
            let now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) event.preventDefault();
            lastTouchEnd = now;
        }, false);

        // --- FUNZIONE PER MIGLIAIA E DECIMALI ---
        function formattaNumero(n) {
            if (n === "" || isNaN(n)) return n;
            return Number(n).toLocaleString('it-IT', { maximumFractionDigits: 10 });
        }

        // AGGIUNGI QUI IL RESTO DELLE TUE FUNZIONI (calcola, aggiungi, etc.)
    </script>
</body>
</html>
