<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Calculator</title>
    <style>
        /* CSS: Il "Vestito" della nostra app */
        body { background-color: #e0e5ec; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        .calculator { background-color: #e0e5ec; padding: 20px; border-radius: 30px; box-shadow: 20px 20px 60px #bec3c9, -20px -20px 60px #ffffff; }
        #display { width: 100%; height: 50px; border: none; background: #e0e5ec; box-shadow: inset 6px 6px 12px #bec3c9, inset -6px -6px 12px #ffffff; border-radius: 10px; margin-bottom: 20px; text-align: right; padding: 10px; font-size: 1.5rem; color: #444; }
        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        button { width: 60px; height: 60px; border-radius: 50%; border: none; background: #e0e5ec; box-shadow: 6px 6px 12px #bec3c9, -6px -6px 12px #ffffff; font-size: 1.2rem; cursor: pointer; transition: 0.2s; }
        button:active { box-shadow: inset 4px 4px 8px #bec3c9, inset -4px -4px 8px #ffffff; transform: scale(0.95); }
        .operator { color: #ff8c00; font-weight: bold; }
    </style>
</head>
<body>

    <div class="calculator">
        <input type="text" id="display" disabled>
        <div class="buttons">
       <button onclick="clearDisplay()">C</button>
       <button onclick="percentage()">%</button> <button onclick="appendToDisplay('/')" class="operator">/</button>
            <button onclick="appendToDisplay('*')" class="operator">×</button>
            <button onclick="deleteLast()">⌫</button>
            
            <button onclick="appendToDisplay('7')">7</button>
            <button onclick="appendToDisplay('8')">8</button>
            <button onclick="appendToDisplay('9')">9</button>
            <button onclick="appendToDisplay('-')" class="operator">-</button>
            
            <button onclick="appendToDisplay('4')">4</button>
            <button onclick="appendToDisplay('5')">5</button>
            <button onclick="appendToDisplay('6')">6</button>
            <button onclick="appendToDisplay('+')" class="operator">+</button>
            
            <button onclick="appendToDisplay('1')">1</button>
            <button onclick="appendToDisplay('2')">2</button>
            <button onclick="appendToDisplay('3')">3</button>
            <button onclick="calculate()" style="grid-row: span 2; height: 135px; border-radius: 30px; background: #4caf50; color: white;">=</button>
            
            <button onclick="appendToDisplay('0')" style="grid-column: span 2; width: 135px; border-radius: 30px;">0</button>
            <button onclick="appendToDisplay('.')">.</button>
        </div>
    </div>

    <script>
        // JavaScript: Il "Cervello"
        const display = document.getElementById('display');

        function appendToDisplay(input) {
            display.value += input;
        }

        function clearDisplay() {
            display.value = "";
        }

        function deleteLast() {
            display.value = display.value.slice(0, -1);
        }

        function calculate() {
            try {
                // eval() è una funzione potente che calcola stringhe matematiche
                display.value = eval(display.value);
            } catch (error) {
                display.value = "Errore";
            }
        }
      function percentage() {
    if (display.value !== "") {
        display.value = eval(display.value) / 100;
    }
}
    </script>
</body>
</html>
