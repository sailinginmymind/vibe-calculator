<!DOCTYPE html>
<html lang="it">
<head>
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#e0e5ec">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Calculator Pro</title>
    <style>
        /* IL VESTITO (CSS) - Qui gestiamo la griglia e l'estetica */
        body { 
            background-color: #e0e5ec; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }

        .calculator { 
            background-color: #e0e5ec; 
            padding: 25px; 
            border-radius: 30px; 
            box-shadow: 20px 20px 60px #bec3c9, -20px -20px 60px #ffffff; 
            width: 320px;
        }

        #display { 
            width: 100%; 
            height: 60px; 
            border: none; 
            background: #e0e5ec; 
            box-shadow: inset 6px 6px 12px #bec3c9, inset -6px -6px 12px #ffffff; 
            border-radius: 10px; 
            margin-bottom: 25px; 
            text-align: right; 
            padding: 15px; 
            font-size: 1.8rem; 
            color: #444; 
            box-sizing: border-box;
        }

        /* Griglia a 4 colonne fissa */
        .buttons { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 15px; 
        }

        button { 
            width: 60px; 
            height: 60px; 
            border-radius: 50%; 
            border: none; 
            background: #e0e5ec; 
            box-shadow: 6px 6px 12px #bec3c9, -6px -6px 12px #ffffff; 
            font-size: 1.2rem; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button:active { 
            box-shadow: inset 4px 4px 8px #bec3c9, inset -4px -4px 8px #ffffff; 
            transform: scale(0.95); 
        }

        .operator { color: #ff8c00; font-weight: bold; }
        .clear { color: #eb4d4b; font-weight: bold; }
        
        /* Tasto uguale che occupa due colonne per bilanciare la griglia */
        .equal { 
            grid-column: span 2; 
            width: 135px; 
            border-radius: 30px; 
            background: #4caf50; 
            color: white; 
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="calculator">
        <input type="text" id="display" disabled placeholder="0">
        <div class="buttons">
            <button onclick="clearDisplay()" class="clear">C</button>
            <button onclick="deleteLast()">⌫</button>
            <button onclick="percentage()">%</button>
            <button onclick="appendToDisplay('/')" class="operator">÷</button>
            
            <button onclick="appendToDisplay('7')">7</button>
            <button onclick="appendToDisplay('8')">8</button>
            <button onclick="appendToDisplay('9')">9</button>
            <button onclick="appendToDisplay('*')" class="operator">×</button>
            
            <button onclick="appendToDisplay('4')">4</button>
            <button onclick="appendToDisplay('5')">5</button>
            <button onclick="appendToDisplay('6')">6</button>
            <button onclick="appendToDisplay('-')" class="operator">-</button>
            
            <button onclick="appendToDisplay('1')">1</button>
            <button onclick="appendToDisplay('2')">2</button>
            <button onclick="appendToDisplay('3')">3</button>
            <button onclick="appendToDisplay('+')" class="operator">+</button>
            
            <button onclick="appendToDisplay('0')">0</button>
            <button onclick="appendToDisplay('.')">.</button>
            <button onclick="calculate()" class="equal">=</button>
        </div>
    </div>

    <script>
        // IL CERVELLO (JavaScript)
        const display = document.getElementById('display');

        function appendToDisplay(input) {
            display.value += input;
        }

        function clearDisplay() {
            display.value = "";
        }

        function deleteLast() {
            display.value = display.value.slice(0, -1);
        }

        function percentage() {
            if (display.value !== "") {
                try {
                    // Calcola il valore attuale e lo divide per 100
                    display.value = eval(display.value) / 100;
                } catch (e) {
                    display.value = "Errore";
                }
            }
        }

        function calculate() {
            try {
                if (display.value !== "") {
                    display.value = eval(display.value);
                }
            } catch (error) {
                display.value = "Errore";
            }
        }
    </script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js')
      .then(() => console.log("PWA Registrata con successo!"));
  }
</script>
</body>
</html>
